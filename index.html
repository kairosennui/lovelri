function getSlots(date, cid, bookings) {
  const s = date.getDate() + date.getMonth()*31 + (cid==="tony"?7:cid==="christina"?13:cid==="jen"?17:cid==="natalie"?11:3);

// ── ICS CALENDAR GENERATOR ────────────────────────────────────────────────────
// Creates a .ics file Gary can tap to add appointment to Apple/Google Calendar
// Includes 1hr and 15min reminders
function makeICS(booking, consultantName) {
  const [y,m,d] = booking.date.split("-").map(Number);
  const [tp, ap] = booking.time.split(" ");
  let [h,min] = tp.split(":").map(Number);
  if(ap==="PM"&&h!==12) h+=12;
  if(ap==="AM"&&h===12) h=0;
  const pad = n=>String(n).padStart(2,"0");
  const eh = h+Math.floor((min+booking.duration)/60);
  const em = (min+booking.duration)%60;
  const dtStart = `${y}${pad(m)}${pad(d)}T${pad(h)}${pad(min)}00`;
  const dtEnd   = `${y}${pad(m)}${pad(d)}T${pad(eh)}${pad(em)}00`;
  const loc = booking.apptId==="virtual" ? "Virtual — Video Call" : "320 Bay Street\\, Toronto\\, ON M5H 4A6";
  const desc = `Client: ${booking.name}\\nEmail: ${booking.email}\\nPhone: ${booking.phone||"—"}\\nOccasion: ${booking.occasion||"—"}\\nBudget: ${booking.budget||"—"}\\nNotes: ${booking.notes||"—"}\\nBooking ID: ${booking.id}`;
  const ics = [
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Lovelri//Bookings//EN","CALSCALE:GREGORIAN",
    "BEGIN:VEVENT",
    `DTSTART;TZID=America/Toronto:${dtStart}`,
    `DTEND;TZID=America/Toronto:${dtEnd}`,
    `SUMMARY:💍 ${booking.type} — ${booking.name}`,
    `DESCRIPTION:${desc}`,
    `LOCATION:${loc}`,
    `STATUS:CONFIRMED`,
    `BEGIN:VALARM\nTRIGGER:-PT60M\nACTION:DISPLAY\nDESCRIPTION:1 hour: ${booking.type} with ${booking.name}\nEND:VALARM`,
    `BEGIN:VALARM\nTRIGGER:-PT15M\nACTION:DISPLAY\nDESCRIPTION:15 min: ${booking.type} with ${booking.name}\nEND:VALARM`,
    "END:VEVENT","END:VCALENDAR"
  ].join("\r\n");
  return "data:text/calendar;charset=utf8," + encodeURIComponent(ics);
}
// ── CALENDAR DEEP LINKS ───────────────────────────────────────────────────────
// One-click "Add to Calendar" URLs for Google / Outlook (live + 365) / Yahoo.
// These are quick-add deep links that work without any server. The recipient
// taps the link in their email and the event opens pre-filled in their calendar.
function makeCalLinks(booking) {
  const [y, mo, d] = booking.date.split("-").map(Number);
  const [tp, ap] = booking.time.split(" ");
  let [h, min] = tp.split(":").map(Number);
  if (ap === "PM" && h !== 12) h += 12;
  if (ap === "AM" && h === 12) h = 0;
  // Note: we treat the wall-clock time as floating local time. Calendar apps
  // will display it in the user's tz unless ctz is specified (Google).
  const startD = new Date(Date.UTC(y, mo - 1, d, h, min));
  const endD = new Date(startD.getTime() + booking.duration * 60000);
  const fmt = dt => dt.toISOString().replace(/[-:]|\.\d{3}/g, "");
  const startStr = fmt(startD);
  const endStr = fmt(endD);
  const title = `Lovelri ${booking.type} — ${booking.name}`;
  const loc = booking.apptId === "virtual"
    ? "Virtual Video Call (Lovelri)"
    : "320 Bay Street, Toronto ON M5H 4A6";
  const lines = [
    `Lovelri Booking ${booking.id}`,
    `Client: ${booking.name}`,
    `Email: ${booking.email}`,
    `Phone: ${booking.phone || "—"}`,
    `Notes: ${booking.notes || "None"}`,
  ];
  const desc = lines.join("\n");
  const enc = encodeURIComponent;
  return {
    google:  `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${enc(title)}&dates=${startStr}/${endStr}&details=${enc(desc)}&location=${enc(loc)}&ctz=America/Toronto`,
    outlook: `https://outlook.live.com/calendar/0/deeplink/compose?path=%2Fcalendar%2Faction%2Fcompose&rru=addevent&subject=${enc(title)}&startdt=${enc(startD.toISOString())}&enddt=${enc(endD.toISOString())}&body=${enc(desc)}&location=${enc(loc)}`,
    office:  `https://outlook.office.com/calendar/0/deeplink/compose?path=%2Fcalendar%2Faction%2Fcompose&rru=addevent&subject=${enc(title)}&startdt=${enc(startD.toISOString())}&enddt=${enc(endD.toISOString())}&body=${enc(desc)}&location=${enc(loc)}`,
    yahoo:   `https://calendar.yahoo.com/?v=60&title=${enc(title)}&st=${startStr}&et=${endStr}&desc=${enc(desc)}&in_loc=${enc(loc)}`,
  };
}

// ── GOOGLE SHEETS BACKEND ─────────────────────────────────────────────────────
// Paste your Apps Script Web App URL here once. See apps-script.gs + README.md

const SHEETS_URL = "https://script.google.com/macros/s/AKfycbzBBBgx_nBjP8FlUTEBRRf8xwrkeK6Pq2QNZ4Gun_83U681Va6tzgnIQT7Oe2b_QtrKlg/exec";

async function pushToSheet(tab, item) {
  if (!SHEETS_URL) return; // localStorage-only mode
  try {
    await fetch(SHEETS_URL, {
      method: "POST",
      mode: "cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ tab, item: { ...item, createdAt: new Date().toISOString() } }),
    });
  } catch (err) {
    console.error("Sheets push failed (data still saved locally):", err);
  }
}

async function pullFromSheet(tab) {
  if (!SHEETS_URL) return null;
  try {
    const resp = await fetch(SHEETS_URL + "?tab=" + encodeURIComponent(tab), { mode: "cors" });
    const data = await resp.json();
    const items = Array.isArray(data.items) ? data.items : null;
    if (!items) return null;
    // Sheets sometimes auto-types cells as Date/Time, which JSON-stringifies as
    // "1899-12-30T14:00:00.000Z" (time-only) or "2026-05-12T..." (full date).
    // Normalize back into the human-readable strings the dashboard expects.
    const fmtTime = (iso) => {
      try {
        const d = new Date(iso);
        let h = d.getUTCHours();
        const m = d.getUTCMinutes();
        const ap = h >= 12 ? "PM" : "AM";
        const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
        return h12 + ":" + String(m).padStart(2,"0") + " " + ap;
      } catch (e) { return iso; }
    };
    return items.map(item => {
      const out = { ...item };
      if (typeof out.time === "string" && out.time.startsWith("1899-")) out.time = fmtTime(out.time);
      if (typeof out.date === "string" && out.date.includes("T")) out.date = out.date.split("T")[0];
      // Also drop tab id from Date strings
      if (typeof out.createdAt === "string" && out.createdAt.includes("T") && out.createdAt.length > 24) {
        out.createdAt = out.createdAt.slice(0,19);
      }
      return out;
    });
  } catch (err) {
    console.error("Sheets pull failed (using local cache):", err);
    return null;
  }
}

  }, [prefill]);

    pushToSheet("Bookings", bk);

    const cl = makeICS(bk, TEAM.find(t=>t.id===cons.id)?.name||"Team");

      <div style={{border:`1px solid ${B.border}`,background:B.offwhite,padding:"11px 14px",marginBottom:16}}>
        <div style={{fontFamily:B.sans,fontSize:11,letterSpacing:"0.16em",textTransform:"uppercase",color:B.gray,marginBottom:5}}>Email & Calendar Routing</div>
        <div style={{fontFamily:B.sans,fontSize:13,color:B.black,lineHeight:1.8}}>
          Every booking → <strong>garykcli@gmail.com</strong><br/>
          📅 Calendar invite (.ics) included in Gary's email<br/>
          📧 Confirmation copy → client's email
        </div>
      </div>
      {/* Mini calendar */}
      <div style={{border:`1px solid ${B.border}`,background:B.white,marginBottom:16}}>
        <div style={{padding:"9px 14px",borderBottom:`1px solid ${B.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <button onClick={()=>{if(cm===0){setCm(11);setCy(y=>y-1);}else setCm(m=>m-1);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:B.black}}>‹</button>
          <div style={{fontFamily:B.serif,fontSize:16,color:B.black}}>{MONTHS[cm]} {cy}</div>
          <button onClick={()=>{if(cm===11){setCm(0);setCy(y=>y+1);}else setCm(m=>m+1);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:B.black}}>›</button>
        </div>
        <div style={{padding:"8px 10px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:3}}>{DAYS.map(d=><div key={d} style={{fontFamily:B.sans,fontSize:10,color:B.gray,textAlign:"center"}}>{d[0]}</div>)}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
            {Array.from({length:fD}).map((_,i)=><div key={`e${i}`}/>)}
            {Array.from({length:dIM}).map((_,i)=>{
              const day=i+1;
              const ds=`${cy}-${String(cm+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
              const has=byDate[ds]?.length>0;
              const isT=ds===todayStr;
              return(
                <div key={day}
                  onClick={()=> setDateFilter(ds === dateFilter ? null : ds)}
                  style={{aspectRatio:"0.85",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",padding:"4px 2px 3px",gap:1,
                    background: ds===dateFilter ? B.black : (isT ? B.offwhite : "transparent"),
                    border: ds===dateFilter ? `1px solid ${B.black}` : (isT ? `1px solid ${B.gold}` : `1px solid transparent`),
                    cursor:"pointer",transition:"background 0.1s"}}
                  onMouseEnter={e=>{ if(ds!==dateFilter) e.currentTarget.style.background=B.offwhite; }}
                  onMouseLeave={e=>{ if(ds!==dateFilter) e.currentTarget.style.background = isT ? B.offwhite : "transparent"; }}>
                  <span style={{fontFamily:B.sans,fontSize:13,color: ds===dateFilter ? B.white : B.black,lineHeight:1.1}}>{day}</span>
                  {has && (
                    <span style={{fontFamily:B.sans,fontSize:9,color: ds===dateFilter ? "rgba(255,255,255,0.7)" : B.gray,letterSpacing:"0.04em",lineHeight:1}}>
                      {byDate[ds].length} {byDate[ds].length===1?"appt":"appts"}
                    </span>
                  )}
                  {has && (
                    <div style={{display:"flex",gap:2,marginTop:1,flexWrap:"wrap",justifyContent:"center"}}>
                      {dateConsultants(ds).slice(0,4).map(cid=>{
                        const t = TEAM.find(x=>x.id===cid);
                        return <div key={cid} title={t?.name||cid} style={{width:6,height:6,borderRadius:"50%",background: t?.color||B.gold,border: ds===dateFilter?`1px solid ${B.white}`:"none"}}/>;
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          {/* Consultant legend */}
          <div style={{display:"flex",flexWrap:"wrap",gap:9,padding:"8px 12px 9px",borderTop:`1px solid ${B.border}`}}>
            {TEAM.filter(t=>t.id!=="any").map(t=>(
              <div key={t.id} style={{display:"flex",alignItems:"center",gap:4,fontFamily:B.sans,fontSize:10,color:B.gray}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:t.color}}/>
                <span>{t.name}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
      {/* Filters */}
      <div style={{display:"flex",gap:5,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",gap:4,flex:1,flexWrap:"wrap"}}>
          {[{id:"all",name:"All",color:B.gray},...TEAM.filter(t=>t.id!=="any")].map(t=>(
            <button key={t.id} onClick={()=>setFilter(t.id)}
              style={{padding:"5px 10px",border:`1px solid ${filter===t.id?B.black:B.border}`,background:filter===t.id?B.black:B.white,color:filter===t.id?B.white:B.black,fontFamily:B.sans,fontSize:11,letterSpacing:"0.06em",textTransform:"uppercase",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
              {t.id!=="all"&&<div style={{width:6,height:6,borderRadius:"50%",background:t.color}}/>}
              {t.name}
            </button>
          ))}
        </div>
        <div style={{display:"flex",gap:4}}>
          {[["upcoming","Upcoming"],["all","All"]].map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)} style={{padding:"5px 10px",border:`1px solid ${view===v?B.black:B.border}`,background:view===v?B.offwhite:B.white,fontFamily:B.sans,fontSize:11,letterSpacing:"0.06em",textTransform:"uppercase",cursor:"pointer",color:B.black}}>{l}</button>
          ))}
        </div>
      </div>
      {/* Booking list */}
      {(dateFilter || statusFilter) && (
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginBottom:11,padding:"9px 11px",background:"rgba(201,169,110,0.08)",border:`1px solid ${B.gold}`}}>
          <span style={{fontFamily:B.sans,fontSize:11,letterSpacing:"0.14em",textTransform:"uppercase",color:B.gold,marginRight:5}}>Filters</span>
          {dateFilter && (<span onClick={()=>setDateFilter(null)} style={{fontFamily:B.sans,fontSize:12,padding:"3px 9px",background:B.black,color:B.white,cursor:"pointer"}}>Date: {dateFilter} ×</span>)}
          {statusFilter && (<span onClick={()=>setStatusFilter(null)} style={{fontFamily:B.sans,fontSize:12,padding:"3px 9px",background:B.black,color:B.white,cursor:"pointer"}}>Status: {statusFilter} ×</span>)}
          <button onClick={()=>{setDateFilter(null);setStatusFilter(null);}} style={{marginLeft:"auto",fontFamily:B.sans,fontSize:11,letterSpacing:"0.06em",background:"none",border:"none",color:B.gray,cursor:"pointer",textDecoration:"underline"}}>Clear all</button>
        </div>
      )}
      <Lbl c={`${list.length} appointment${list.length!==1?"s":""}`}/>
      <div style={{border:`1px solid ${B.border}`}}>
        {list.length===0
          ?<div style={{padding:"32px 16px",textAlign:"center",fontFamily:B.sans,fontSize:14,color:B.gray}}>No appointments found.</div>
          :list.map((bk,i)=>{
            const con=TEAM.find(t=>t.id===bk.consultant);
            const isT=bk.date===todayStr;
            const isO=open===bk.id;
            const cl=makeICS(bk,con?.name||"Team");
            return(
              <div key={bk.id} onClick={()=>setOpen(isO?null:bk.id)}
                style={{padding:"13px 16px",borderBottom:i<list.length-1?`1px solid ${B.border}`:"none",background:isT?"rgba(201,169,110,0.04)":B.white,cursor:"pointer",borderLeft:isT?`3px solid ${B.gold}`:"3px solid transparent"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5,gap:8}}>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:B.sans,fontSize:15,color:B.black,fontWeight:500}}>{bk.name}</div>
                    <div style={{fontFamily:B.sans,fontSize:12,color:B.gray}}>{bk.email}{bk.phone?` · ${bk.phone}`:""}</div>
                  </div>
                  <Badge s={bk.status}/>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontFamily:B.sans,fontSize:13,color:B.black}}>{bk.type}</span>
                  <span style={{color:B.lightgray}}>·</span>
                  <span style={{fontFamily:B.sans,fontSize:13,color:B.gray}}>{new Date(bk.date+"T12:00:00").toLocaleDateString("en-CA",{month:"short",day:"numeric"})} at {bk.time}</span>
                  <span style={{color:B.lightgray}}>·</span>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <div style={{width:6,height:6,borderRadius:"50%",background:con?.color||B.gray}}/>
                    <span style={{fontFamily:B.sans,fontSize:12,color:B.gray}}>{con?.name}</span>
                  </div>
                  {bk.budget&&<><span style={{color:B.lightgray}}>·</span><span style={{fontFamily:B.sans,fontSize:12,color:B.gray}}>{bk.budget}</span></>}
                </div>
                {isO&&(
                  <div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${B.border}`}}>
                    {bk.notes&&<div style={{fontFamily:B.sans,fontSize:13,color:B.gray,lineHeight:1.6,marginBottom:10,background:B.offwhite,padding:"9px 11px"}}><strong style={{color:B.black}}>Notes: </strong>{bk.notes}</div>}
                    <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:12}}>
                      {[["ID",bk.id],["Occasion",bk.occasion||"—"],["Duration",`${bk.duration}min`]].map(([k,v])=>(
                        <div key={k}><div style={{fontFamily:B.sans,fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",color:B.gray,marginBottom:2}}>{k}</div><div style={{fontFamily:B.sans,fontSize:13,color:B.black}}>{v}</div></div>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {bk.status!=="confirmed"&&(
                        <button onClick={e=>{e.stopPropagation();onStatus(bk.id,"confirmed");}} style={{padding:"7px 12px",background:B.black,color:B.white,border:"none",fontFamily:B.sans,fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",cursor:"pointer"}}>Confirm</button>
                      )}
                      {bk.status!=="cancelled"&&(
                        <button onClick={e=>{e.stopPropagation();onStatus(bk.id,"cancelled");}} style={{padding:"7px 12px",background:B.white,color:"#c0392b",border:"1px solid #c0392b",fontFamily:B.sans,fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",cursor:"pointer"}}>Cancel</button>
                      )}
                      <a href={`mailto:${bk.email}?subject=Your Lovelri Appointment`} onClick={e=>e.stopPropagation()} style={{padding:"7px 12px",background:B.white,color:B.black,border:`1px solid ${B.border}`,fontFamily:B.sans,fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",cursor:"pointer",textDecoration:"none"}}>Email Client</a>
                      <a href={cl} download={`lovelri-${bk.id}.ics`} onClick={e=>e.stopPropagation()} style={{padding:"7px 12px",background:B.white,color:B.black,border:`1px solid ${B.border}`,fontFamily:B.sans,fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",cursor:"pointer",textDecoration:"none"}}>📅 Add to Cal</a>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
      </div>
    </div>
  );
}
