  .ring-rail::-webkit-scrollbar{height:6px}
  .ring-rail::-webkit-scrollbar-thumb{background:#d8d8d2;border-radius:3px}

     correct even before React runs / regardless of JS isNarrow state.
     Target: viewport width ≤ 900px (covers all phones in portrait
     and most tablets in portrait).
     ═══════════════════════════════════════════════════════════════════ */
  @media (max-width: 900px) {
    .tryon-grid {
      grid-template-columns: 1fr !important;
      gap: 14px !important;
      padding: 12px !important;
    }
    .tryon-stage {
      aspect-ratio: 3/4 !important;
    }
    .tryon-header {
      padding: 16px 18px !important;
    }
    .tryon-brand {
      font-size: 22px !important;
    }
    .tryon-panel {
      padding: 16px !important;
      gap: 18px !important;
    }
    /* Bigger ring picker cards — ~half the screen wide so 2 cards visible
       at once, generous tap target. Photo inside is bigger too. */
    .tryon-ring-card {
      flex: 0 0 140px !important;
      padding: 10px !important;
    }
    .tryon-ring-rail {
      gap: 12px !important;
      padding-bottom: 14px !important;
      /* Snap-to-card scrolling feels more deliberate on a phone */
      scroll-snap-type: x mandatory !important;
      -webkit-overflow-scrolling: touch !important;
    }
    .tryon-ring-card-name { font-size: 13px !important; }
    .tryon-ring-card-price { font-size: 11px !important; }
    .tryon-capture-btn {
      padding: 14px 18px !important;
      min-height: 44px !important;
    }
    /* Bigger metal swatches: full-width, finger-sized, easy to tap */
    .tryon-metal-swatch {
      padding: 14px !important;
      gap: 10px !important;
    }
    .tryon-metal-swatch-disc {
      width: 44px !important;
      height: 44px !important;
    }
    .tryon-metal-swatch-label { font-size: 11px !important; }
    /* Bigger chips for stone shape filter */
    .tryon-chip {
      padding: 10px 16px !important;
      font-size: 13px !important;
      min-height: 40px !important;
    }
    /* Larger range slider thumb on mobile — default is too small for fingers */
    .tryon-panel input[type="range"] {
      height: 36px !important;
    }
  }
  @media (max-width: 480px) {
    .tryon-h2 { font-size: 18px !important; }
    .tryon-grid { padding: 8px !important; }
    .tryon-ring-card { flex: 0 0 120px !important; }

const SIZES = [4, 4.5, 5, 5.5, 6, 6.5, 7, 7.5, 8, 8.5, 9, 9.5, 10];

// ── HELPERS ──────────────────────────────────────────────────────────────────
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const lerp = (a, b, t) => a + (b - a) * t;

// Cross product helper: returns the cross of two 3D vectors as {x,y,z}
function cross3(ax, ay, az, bx, by, bz) {
  return {
    x: ay * bz - az * by,
    y: az * bx - ax * bz,
    z: ax * by - ay * bx,
  };
}

// Pre-process a ring photo: chromakey near-white pixels to transparent. Returns
// a tinted canvas. Lower thresholds = more aggressive (eats edges) — these
// values were tuned for Lovelri's ~white-grey product backgrounds.
function chromakeyWhite(img) {
  const c = document.createElement("canvas");
  c.width = img.naturalWidth || img.width;
  c.height = img.naturalHeight || img.height;
  const ctx = c.getContext("2d");
  ctx.drawImage(img, 0, 0);
  try {
    const id = ctx.getImageData(0, 0, c.width, c.height);
    const d = id.data;
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i+1], b = d[i+2];
      const max = Math.max(r,g,b), min = Math.min(r,g,b);
      const lum = (r + g + b) / 3;
      const chroma = max - min;
      // Tighter than v1: kill anything bright + low-chroma (white/grey bg)
      if (lum > 232 && chroma < 12) {
        d[i+3] = 0;
      } else if (lum > 215 && chroma < 18) {
        d[i+3] = Math.max(0, d[i+3] - 200);
      } else if (lum > 200 && chroma < 12) {
        // Soft outer halo
        d[i+3] = Math.max(0, d[i+3] - 100);
      }
    }
    ctx.putImageData(id, 0, 0);
  } catch (e) {
    console.warn("chromakey skipped (CORS-tainted):", e.message);
  }
  return c;
}

// Image loader. For pre-processed PNGs in ./rings/multi/ (already
// chromakeyed + auto-cropped at build time by scripts/process-rings.js),
// we MUST skip the runtime chromakey pass — it would otherwise treat the
// white-gold ring band itself (bright + low-chroma) as background and
// erase it. For everything else we still chromakey at load time.
const _ringCache = new Map();
function imageToCanvas(img) {
  const c = document.createElement("canvas");
  c.width = img.naturalWidth || img.width;
  c.height = img.naturalHeight || img.height;
  c.getContext("2d").drawImage(img, 0, 0);
  return c;
}
function loadRingImage(url) {
  if (_ringCache.has(url)) return _ringCache.get(url);
  const isPreProcessed = /\/rings\/multi\//.test(url);
  const promise = new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
      const canvas = isPreProcessed ? imageToCanvas(img) : chromakeyWhite(img);
      // Tag canvas so the renderer can apply the right scale factor:
      // pre-processed multi/ images are tight-cropped (use 1.0× knuckleSpan),
      // legacy ./rings/*.png have whitespace padding (use 1.55×).
      canvas._isMulti = isPreProcessed;
      resolve(canvas);
    };
    img.onerror = () => resolve(null);
    img.src = url;
  });
  _ringCache.set(url, promise);
  return promise;
}

// ── HAND-TRACKING + RENDER LOOP ─────────────────────────────────────────────
function startTracking({ videoEl, canvasEl, getOptions, onStatus, onBucket }) {
  if (!window.Hands || !window.Camera) {
    onStatus("MediaPipe failed to load. Check your network connection and reload.");
    return () => {};
  }

  // Mobile detection — affects video resolution AND MediaPipe model complexity.
  // On phones: 640x480 + lite model = usable framerate. On desktop: 1280x720
  // + full model = better landmark precision.
  const isMobile = (typeof window !== "undefined") &&
    (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || window.innerWidth < 768);

  const ctx = canvasEl.getContext("2d");
  const hands = new window.Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`,
  });
  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: isMobile ? 0 : 1,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.6,
  });

  let lastResults = null;
  hands.onResults((res) => { lastResults = res; });

  // Explicit facingMode "user" requests the front camera (selfie cam).
  // MediaPipe Camera utility passes this to navigator.mediaDevices.getUserMedia.
  const camera = new window.Camera(videoEl, {
    onFrame: async () => { await hands.send({ image: videoEl }); },
    width:  isMobile ? 640 : 1280,
    height: isMobile ? 480 : 720,
    facingMode: "user",
  });

  let stopped = false;
  let raf = 0;
  let smooth = null;
  let lastBucket = null;

  function render() {
    if (stopped) return;
    raf = requestAnimationFrame(render);
    const w = canvasEl.width = videoEl.videoWidth || 1280;
    const h = canvasEl.height = videoEl.videoHeight || 720;

    // Mirror the video for selfie-style display
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(videoEl, -w, 0, w, h);
    ctx.restore();

    const opts = getOptions();
    const lm = lastResults && lastResults.multiHandLandmarks && lastResults.multiHandLandmarks[0];
    if (lm) {
      // 2D screen coords (x mirrored to match the mirrored video)
      const px = (p) => ({ x: (1 - p.x) * w, y: p.y * h });
      const L0 = px(lm[0]);    // Wrist
      const L5 = px(lm[5]);    // Index MCP
      const L9 = px(lm[9]);    // Middle MCP
      const L13 = px(lm[13]);  // Ring MCP
      const L14 = px(lm[14]);  // Ring PIP
      const L17 = px(lm[17]);  // Pinky MCP

      // ── 3D ORIENTATION (uses the raw 3D landmarks, not screen-mirrored) ──
      // Build palm normal from wrist/index-MCP/pinky-MCP triangle.
      const w0 = lm[0], w5 = lm[5], w17 = lm[17];
      const v1x = w5.x - w0.x, v1y = w5.y - w0.y, v1z = w5.z - w0.z;
      const v2x = w17.x - w0.x, v2y = w17.y - w0.y, v2z = w17.z - w0.z;
      const palmN = cross3(v1x, v1y, v1z, v2x, v2y, v2z);
      const pNlen = Math.hypot(palmN.x, palmN.y, palmN.z) || 1;
      palmN.x /= pNlen; palmN.y /= pNlen; palmN.z /= pNlen;

      // Finger axis (ring MCP → ring PIP) in 3D
      const fx = lm[14].x - lm[13].x, fy = lm[14].y - lm[13].y, fz = lm[14].z - lm[13].z;
      const fLen = Math.hypot(fx, fy, fz) || 1;
      const fingerN = { x: fx/fLen, y: fy/fLen, z: fz/fLen };

      // "Forwardness" = how much finger axis points along camera Z.
      //   ~0 → finger lies in the screen plane (FRONT view)
      //   ~1 → finger points toward/away camera (SIDE view)
      const forwardness = Math.abs(fingerN.z);
      let bucket;
      if (forwardness < 0.30) bucket = "FRONT";
      else if (forwardness < 0.65) bucket = "THREEQ";
      else bucket = "SIDE";

      // Hysteresis: prevent flicker on bucket boundaries by adding deadband
      if (lastBucket && bucket !== lastBucket) {
        const margin = 0.05;
        if (lastBucket === "FRONT" && forwardness < 0.30 + margin) bucket = "FRONT";
        else if (lastBucket === "THREEQ" && forwardness > 0.30 - margin && forwardness < 0.65 + margin) bucket = "THREEQ";
        else if (lastBucket === "SIDE" && forwardness > 0.65 - margin) bucket = "SIDE";
      }
      if (bucket !== lastBucket) {
        lastBucket = bucket;
        onBucket(bucket);
      }

      // ── 2D PLACEMENT (screen-space) ──
      const ringCanvas = opts.ringCanvases ? opts.ringCanvases[bucket] : null;
      const fallback = opts.fallbackCanvas;
      const drawSrc = ringCanvas || fallback;

      if (drawSrc) {
        const cx = lerp(L13.x, L14.x, 0.55);
        const cy = lerp(L13.y, L14.y, 0.55);
        const fingerAngle = Math.atan2(L14.y - L13.y, L14.x - L13.x);
        const knuckleSpan = (dist(L9, L13) + dist(L13, L17)) / 2;
        // Pre-processed PNGs in /rings/multi/ are tight-cropped, so the
        // band's outer diameter ≈ image width. Legacy ./rings/*.png have
        // whitespace padding so they need a larger draw scale.
        const isMulti = drawSrc._isMulti === true;
        const baseScale = isMulti ? 1.0 : 1.55;
        const targetWidth = knuckleSpan * baseScale * (opts.sizeScale || 1.0);

        const next = { cx, cy, angle: fingerAngle, w: targetWidth };
        if (!smooth) smooth = next;
        else {
          const a = 0.35;
          smooth = {
            cx: lerp(smooth.cx, next.cx, a),
            cy: lerp(smooth.cy, next.cy, a),
            angle: Math.atan2(
              lerp(Math.sin(smooth.angle), Math.sin(next.angle), a),
              lerp(Math.cos(smooth.angle), Math.cos(next.angle), a)
            ),
            w: lerp(smooth.w, next.w, a),
          };
        }

        const aspect = drawSrc.height / drawSrc.width;
        const drawW = smooth.w;
        const drawH = drawW * aspect;

        ctx.save();
        ctx.translate(smooth.cx, smooth.cy);
        // For SIDE view: ring's profile band is horizontal in the photo, so
        // rotate to align long axis perpendicular to finger.
        // For FRONT/THREEQ: ring's "up" (gem) should align with back-of-hand
        // direction, so similar rotation works as a base approximation.
        ctx.rotate(smooth.angle + Math.PI / 2);
        ctx.drawImage(drawSrc, -drawW / 2, -drawH / 2, drawW, drawH);
        ctx.restore();

        if (opts.debug) {
          ctx.fillStyle = "rgba(201,169,110,0.9)";
          ctx.beginPath();
          ctx.arc(smooth.cx, smooth.cy, 4, 0, Math.PI*2);
          ctx.fill();
          ctx.font = "12px sans-serif";
          ctx.fillStyle = "#fff";
          ctx.fillText(`${bucket} fwd=${forwardness.toFixed(2)}`, smooth.cx + 8, smooth.cy - 8);
        }
      }
    } else {
      smooth = null;
    }
  }

  camera.start()
    .then(() => { onStatus("ready"); render(); })
    .catch((err) => onStatus("camera-error: " + (err && err.message || err)));

  return () => {
    stopped = true;
    cancelAnimationFrame(raf);
    try { camera.stop(); } catch(_) {}
    try { hands.close(); } catch(_) {}
  };
}

// ─────────────────────────────────────────────────────────────────────────────
// REACT UI
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const optsRef = useRef({ ringCanvases: null, fallbackCanvas: null, sizeScale: 1, debug: false });

  const [ringViews, setRingViews] = useState(null);  // loaded from ring-views.json
  const [selectedSlug, setSelectedSlug] = useState("sicily-lotus-ring");
  const [metal, setMetal] = useState("white");
  const [shape, setShape] = useState("All");
  const [size, setSize] = useState(7);
  const [debug, setDebug] = useState(false);
  const [status, setStatus] = useState("starting");
  const [bucket, setBucket] = useState("FRONT");
  const [ringReady, setRingReady] = useState(false);

  // Track viewport for responsive layout — desktop uses 2-column grid,
  // mobile stacks the camera above the configurator.
  const [isNarrow, setIsNarrow] = useState(
    typeof window !== "undefined" ? window.innerWidth < 900 : false
  );
  useEffect(() => {
    const check = () => setIsNarrow(window.innerWidth < 900);
    window.addEventListener("resize", check);
    window.addEventListener("orientationchange", check);
    return () => {
      window.removeEventListener("resize", check);
      window.removeEventListener("orientationchange", check);
    };
  }, []);

  const filteredRings = useMemo(
    () => shape === "All" ? RINGS : RINGS.filter(r => r.shapes.includes(shape)),
    [shape]
  );
  const selected = useMemo(
    () => RINGS.find(r => r.slug === selectedSlug) || RINGS[0],
    [selectedSlug]
  );
  const isPilot = !!(ringViews && ringViews.rings && ringViews.rings[selectedSlug]);

  // Load ring-views.json once
  useEffect(() => {
    fetch("./ring-views.json")
      .then(r => r.ok ? r.json() : null)
      .then(setRingViews)
      .catch(() => setRingViews({ rings: {} }));
  }, []);

  // Load + chromakey ring photos when ring/metal selection changes.
  // Pilot rings: load all 3 angles for the selected metal.
  // Non-pilot rings: just load the single product photo (v1 behavior).
  useEffect(() => {
    let cancelled = false;
    setRingReady(false);
    optsRef.current.ringCanvases = null;
    optsRef.current.fallbackCanvas = null;

    if (isPilot && ringViews) {
      const slots = ringViews.rings[selectedSlug].slots;
      const urls = {
        FRONT:  slots.FRONT[metal]  || slots.FRONT.white,
        THREEQ: slots.THREEQ[metal] || slots.THREEQ.white,
        SIDE:   slots.SIDE[metal]   || slots.SIDE.white,
      };
      Promise.all([
        loadRingImage(urls.FRONT),
        loadRingImage(urls.THREEQ),
        loadRingImage(urls.SIDE),
      ]).then(([front, threeq, side]) => {
        if (cancelled) return;
        optsRef.current.ringCanvases = { FRONT: front, THREEQ: threeq, SIDE: side };
        optsRef.current.fallbackCanvas = front || threeq || side;
        setRingReady(true);
      });
    } else {
      // Non-pilot fallback: try local PNG, then remote
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.src = selected.img;
      img.onload = () => {
        if (cancelled) return;
        const c = chromakeyWhite(img);
        optsRef.current.fallbackCanvas = c;
        optsRef.current.ringCanvases = { FRONT: c, THREEQ: c, SIDE: c };
        setRingReady(true);
      };
      img.onerror = () => {
        const f = new Image();
        f.crossOrigin = "anonymous";
        f.src = selected.remote;
        f.onload = () => {
          if (cancelled) return;
          const c = chromakeyWhite(f);
          optsRef.current.fallbackCanvas = c;
          optsRef.current.ringCanvases = { FRONT: c, THREEQ: c, SIDE: c };
          setRingReady(true);
        };
      };
    }

    return () => { cancelled = true; };
  }, [selectedSlug, metal, isPilot, ringViews]);

  // Keep options ref in sync with size/debug state
  useEffect(() => {
    optsRef.current.sizeScale = sizeScale(size);
    optsRef.current.debug = debug;
  }, [size, debug]);

  // Init MediaPipe.
  // Desktop: auto-start on mount.
  // Mobile (iOS Safari especially): blocks getUserMedia without a user gesture,
  // so we wait for a tap on the "Start camera" overlay before starting.
  const [hasStarted, setHasStarted] = useState(false);
  const isTouch = typeof window !== "undefined" &&
    ("ontouchstart" in window || navigator.maxTouchPoints > 0);

  useEffect(() => {
    if (!videoRef.current || !canvasRef.current) return;
    // Auto-start only on non-touch devices (desktop). Mobile waits for tap.
    if (isTouch && !hasStarted) return;
    const stop = startTracking({
      videoEl: videoRef.current,
      canvasEl: canvasRef.current,
      getOptions: () => optsRef.current,
      onStatus: setStatus,
      onBucket: setBucket,
    });
    return stop;
  }, [hasStarted, isTouch]);

  const snapshot = useCallback(() => {
    if (!canvasRef.current) return;
    const a = document.createElement("a");
    a.href = canvasRef.current.toDataURL("image/png");
    a.download = `lovelri-tryon-${selected.slug}-${Date.now()}.png`;
    a.click();
  }, [selected.slug]);

  // ── styles ─────────────────────────────────────────────────────────────────
  const S = {
    page: { fontFamily: B.sans, color: B.black, background: B.offwhite, minHeight: "100vh" },
    header: {
      display:"flex", alignItems:"center", justifyContent:"space-between",
      padding: isNarrow ? "16px 18px" : "22px 32px",
      borderBottom:`1px solid ${B.lightgray}`, background: B.white,
    },
    brand: { fontFamily: B.serif, fontSize: isNarrow ? 22 : 28, fontWeight:500, letterSpacing:"0.02em" },
    eyebrow: { fontSize:11, letterSpacing:"0.22em", textTransform:"uppercase", color:B.gray },
    grid: {
      display:"grid",
      gridTemplateColumns: isNarrow ? "1fr" : "minmax(0,1fr) 380px",
      gap: isNarrow ? 14 : 24,
      padding: isNarrow ? 12 : 24,
      maxWidth: 1440, margin:"0 auto",
    },
    stage: {
      position:"relative", background:"#000", borderRadius:14, overflow:"hidden",
      // On mobile use a tall portrait-ish frame so the hand fills more pixels.
      // On desktop keep the 4:3 widescreen frame.
      aspectRatio: isNarrow ? "3/4" : "4/3",
      boxShadow:"0 20px 60px -30px rgba(0,0,0,0.4)",
    },
    canvas: { width:"100%", height:"100%", display:"block", objectFit:"cover" },
    overlay: {
      position:"absolute", inset:0, display:"flex", alignItems:"flex-end",
      justifyContent:"space-between", padding:18, pointerEvents:"none",
    },
    overlayPill: {
      pointerEvents:"auto",
      background:"rgba(26,26,26,0.55)", color:"#fff",
      padding:"8px 14px", borderRadius:999, fontSize:12, letterSpacing:"0.08em",
      backdropFilter:"blur(8px)",
    },
    bucketPill: {
      position:"absolute", top:18, left:18,
      background:"rgba(201,169,110,0.85)", color:"#fff",
      padding:"6px 12px", borderRadius:6, fontSize:11, letterSpacing:"0.18em",
      textTransform:"uppercase", fontFamily:B.sans, fontWeight:500,
    },
    captureBtn: {
      pointerEvents:"auto", border:"none", cursor:"pointer",
      background: B.gold, color:"#fff",
      padding: isNarrow ? "14px 18px" : "12px 22px",
      borderRadius:999, fontSize: isNarrow ? 12 : 13, letterSpacing:"0.12em",
      textTransform:"uppercase", fontWeight:500,
      boxShadow:"0 8px 30px -10px rgba(201,169,110,0.7)",
      // Larger min tap target on mobile
      minHeight: isNarrow ? 44 : "auto",
    },
    panel: {
      background: B.white, borderRadius:14,
      padding: isNarrow ? 16 : 24,
      border:`1px solid ${B.lightgray}`, alignSelf:"start",
      display:"flex", flexDirection:"column", gap: isNarrow ? 16 : 20,
    },
    sectionTitle: { fontFamily: B.serif, fontSize:20, fontWeight:500, margin:0 },
    sectionSub: { fontSize:12, color:B.gray, marginTop:4 },
    pilotBadge: {
      display:"inline-block", padding:"3px 8px", marginLeft:8,
      background: isPilot ? "rgba(76,175,125,0.15)" : "rgba(201,169,110,0.12)",
      color: isPilot ? "#2d7a54" : B.goldDark,
      fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase", borderRadius:4,
    },
    label: {
      fontSize:11, letterSpacing:"0.18em", textTransform:"uppercase",
      color:B.gray, marginBottom:10, display:"block",
    },
    chipRow: { display:"flex", flexWrap:"wrap", gap:8 },
    chip: (active) => ({
      padding:"7px 14px", borderRadius:999, cursor:"pointer", userSelect:"none",
      fontSize:12, letterSpacing:"0.06em",
      border: active ? `1px solid ${B.gold}` : `1px solid ${B.border}`,
      background: active ? "rgba(201,169,110,0.12)" : B.white,
      color: active ? B.goldDark : B.gray,
      transition:"all 120ms ease",
    }),
    metalRow: { display:"flex", gap:10 },
    metalSwatch: (active) => ({
      flex:1, cursor:"pointer", padding:10, borderRadius:10,
      border: active ? `2px solid ${B.gold}` : `1px solid ${B.border}`,
      background: B.white, display:"flex", flexDirection:"column", gap:8, alignItems:"center",
      transition:"all 120ms ease",
    }),
    swatchDisc: (bg) => ({ width:34, height:34, borderRadius:"50%", background:bg, boxShadow:"inset 0 0 6px rgba(0,0,0,0.18)" }),
    swatchLabel: { fontSize:10, letterSpacing:"0.08em", color:B.gray, textTransform:"uppercase" },
    sliderRow: { display:"flex", alignItems:"center", gap:12 },
    sliderTrack: { flex:1 },
    sizeBadge: {
      minWidth:46, textAlign:"center", fontFamily:B.serif, fontSize:18,
      padding:"4px 10px", border:`1px solid ${B.border}`, borderRadius:8,
    },
    ringRail: {
      display:"flex", gap:10, overflowX:"auto", paddingBottom:10,
      scrollSnapType:"x mandatory",
    },
    ringCard: (active, hasViews) => ({
      flex:"0 0 110px", scrollSnapAlign:"start", cursor:"pointer", textAlign:"center",
      padding:8, borderRadius:10, position:"relative",
      border: active ? `1px solid ${B.gold}` : `1px solid ${B.lightgray}`,
      background: active ? "rgba(201,169,110,0.06)" : B.white,
      transition:"all 120ms ease",
    }),
    ringThumb: { width:"100%", aspectRatio:"1", objectFit:"cover", borderRadius:6, background:"#f4f4f0" },
    ringName: { marginTop:6, fontSize:11, color:B.black, lineHeight:1.3, fontFamily:B.serif },
    ringPrice: { fontSize:10, color:B.gray, letterSpacing:"0.06em" },
    pilotDot: {
      position:"absolute", top:6, right:6,
      width:8, height:8, borderRadius:"50%", background:"#4caf7d",
      boxShadow:"0 0 0 2px #fff",
    },
    statusLine: {
      fontSize:11, color:B.gray, letterSpacing:"0.1em",
      textTransform:"uppercase", padding:"8px 14px",
      background:"rgba(201,169,110,0.08)", borderRadius:6,
    },
    footer: {
      textAlign:"center", padding:"32px 16px", color:B.gray, fontSize:12,
      borderTop:`1px solid ${B.lightgray}`, marginTop:24,
    },
    link: { color:B.goldDark, textDecoration:"none", borderBottom:`1px solid ${B.gold}` },
  };

  // ── render ─────────────────────────────────────────────────────────────────
  const bucketLabel = bucket === "FRONT" ? "Top View" :
                      bucket === "THREEQ" ? "3/4 View" : "Side View";

  return (
    <div style={S.page}>
      <header style={S.header} className="tryon-header">
        <div>
          <div style={S.eyebrow}>Lovelri</div>
          <div style={S.brand} className="tryon-brand">Virtual Try-On</div>
        </div>
        <a href="./index.html" style={{...S.eyebrow, textDecoration:"none", color:B.goldDark}}>← Hub</a>
      </header>

      <div style={S.grid} className="tryon-grid">
        <div>
          <div style={S.stage} className="tryon-stage">
            <video ref={videoRef} className="hidden-source" playsInline muted autoPlay />
            <canvas ref={canvasRef} style={S.canvas} />

            {/* Tap-to-start overlay (mobile only). iOS Safari blocks
                getUserMedia without a user gesture — this button IS the
                gesture. */}
            {isTouch && !hasStarted && (
              <div style={{
                position:"absolute", inset:0, display:"flex",
                flexDirection:"column", alignItems:"center", justifyContent:"center",
                gap:18, background:"rgba(26,26,26,0.92)", color:"#fff",
                cursor:"pointer", textAlign:"center", padding:24,
              }} onClick={() => setHasStarted(true)}>
                <div style={{fontFamily:B.serif, fontSize:32, lineHeight:1.1}}>
                  Try the ring on
                </div>
                <div style={{fontSize:13, color:"#bdbdb8", maxWidth:280, lineHeight:1.5}}>
                  We'll need access to your camera to overlay the ring on your hand. Tap to begin.
                </div>
                <button style={{
                  marginTop:6, padding:"16px 32px", borderRadius:999,
                  background:B.gold, color:"#fff", border:"none",
                  fontSize:13, letterSpacing:"0.16em", textTransform:"uppercase",
                  fontWeight:500, fontFamily:B.sans, cursor:"pointer", minHeight:48,
                }}>
                  Start camera
                </button>
              </div>
            )}

            {isPilot && status === "ready" && (
              <div style={S.bucketPill}>{bucketLabel}</div>
            )}
            <div style={S.overlay}>
              <div style={S.overlayPill}>
                {status === "ready" ? "● Tracking" :
                 status === "starting" ? "Starting camera…" :
                 status.startsWith("camera-error") ? "Camera blocked — allow access and reload" :
                 (isTouch && !hasStarted) ? "Tap to start" :
                 status}
              </div>
              <button style={S.captureBtn} className="tryon-capture-btn" onClick={snapshot} disabled={status !== "ready"}>
                Capture
              </button>
            </div>
          </div>

          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:14, padding:"0 4px", fontSize:12, color:B.gray}}>
            <span>Hold your hand at arm's length, fingers slightly spread. Rotate your hand to see different ring angles.</span>
            <label style={{display:"flex", alignItems:"center", gap:6, cursor:"pointer"}}>
              <input type="checkbox" checked={debug} onChange={e => setDebug(e.target.checked)} />
              <span style={{fontSize:11, letterSpacing:"0.08em", textTransform:"uppercase"}}>Debug</span>
            </label>
          </div>
        </div>

        <aside style={S.panel} className="tryon-panel">
          <div>
            <h2 style={S.sectionTitle}>
              {selected.name}
              <span style={S.pilotBadge}>{isPilot ? "Multi-angle AR" : "Flat overlay"}</span>
            </h2>
            <div style={S.sectionSub}>
              {selected.collection} · {selected.price} ·{" "}
              <a href={selected.url} target="_blank" rel="noreferrer" style={S.link}>View on lovelri.com</a>
            </div>
          </div>

          {!ringReady && <div style={S.statusLine}>Loading ring photos…</div>}

          <div>
            <span style={S.label}>Metal</span>
            <div style={S.metalRow}>
              {METALS.map(m => (
                <div key={m.id} style={S.metalSwatch(metal === m.id)} className="tryon-metal-swatch" onClick={() => setMetal(m.id)}>
                  <div style={S.swatchDisc(m.swatch)} className="tryon-metal-swatch-disc" />
                  <div style={S.swatchLabel} className="tryon-metal-swatch-label">{m.label}</div>
                </div>
              ))}
            </div>
          </div>

          <div>
            <span style={S.label}>Stone shape</span>
            <div style={S.chipRow}>
              {SHAPES.map(s => (
                <div key={s} style={S.chip(shape === s)} className="tryon-chip" onClick={() => setShape(s)}>{s}</div>
              ))}
            </div>
          </div>

          <div>
            <span style={S.label}>Ring size</span>
            <div style={S.sliderRow}>
              <input type="range" min={4} max={10} step={0.5} value={size}
                     onChange={e => setSize(parseFloat(e.target.value))} style={S.sliderTrack} />
              <span style={S.sizeBadge}>{size}</span>
            </div>
          </div>

          <div>
            <span style={S.label}>
              Choose a ring · {filteredRings.length} {shape === "All" ? "" : `with ${shape}`} · green dot = multi-angle AR
            </span>
            <div style={S.ringRail} className="ring-rail tryon-ring-rail">
              {filteredRings.map(r => {
                const hasViews = !!(ringViews && ringViews.rings && ringViews.rings[r.slug]);
                return (
                  <div key={r.slug} style={S.ringCard(r.slug === selectedSlug, hasViews)} className="tryon-ring-card" onClick={() => setSelectedSlug(r.slug)}>
                    {hasViews && <span style={S.pilotDot} title="Multi-angle photos available" />}
                    <img src={r.img} style={S.ringThumb} alt={r.name}
                         onError={(e) => { e.currentTarget.src = r.remote; }} />
                    <div style={S.ringName} className="tryon-ring-card-name">{r.name}</div>
                    <div style={S.ringPrice} className="tryon-ring-card-price">{r.price}</div>
                  </div>
                );
              })}
            </div>
          </div>
        </aside>
      </div>

      <div style={S.footer}>
        AR overlay is for visualization only — final ring sizing and stone clarity are confirmed in person at our Bay Street showroom.<br/>
        Hand tracking by <a href="https://google.github.io/mediapipe/" target="_blank" rel="noreferrer" style={S.link}>MediaPipe Hands</a>. Photos and pricing from lovelri.com.
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
