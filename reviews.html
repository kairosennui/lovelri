<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lovelri · What Couples Say</title>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#fafaf8;color:#1a1a1a;font-family:'Helvetica Neue','Arial',sans-serif}
  #root{min-height:100vh}
  .boot{display:flex;align-items:center;justify-content:center;min-height:100vh;color:#6b6b6b;font-size:13px;letter-spacing:0.22em;text-transform:uppercase}
</style>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div id="root"><div class="boot">Loading reviews</div></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo } = React;

const B = {
  white:"#ffffff", offwhite:"#fafaf8", black:"#1a1a1a",
  gray:"#6b6b6b", lightgray:"#e8e8e4", border:"#d8d8d2",
  gold:"#c9a96e", goldDark:"#8c6d3f",
  serif:"'Cormorant Garamond','Georgia',serif",
  sans:"'Helvetica Neue','Arial',sans-serif",
};

const stars = (n) => "★".repeat(n) + "☆".repeat(5 - n);

function App() {
  const [data, setData] = useState(null);
  const [filter, setFilter] = useState("all");

  useEffect(() => {
    fetch("./reviews.json")
      .then(r => r.ok ? r.json() : null)
      .then(d => setData(d || { reviews: [] }))
      .catch(() => setData({ reviews: [] }));
  }, []);

  // Hide placeholder reviews from the public face. Real reviews don't have
  // _status set, so this filter keeps the customer-facing page empty until
  // Tony has populated reviews.json with real entries.
  const realReviews = useMemo(() => {
    if (!data) return [];
    return (data.reviews || []).filter(r => !r._status);
  }, [data]);

  const filteredReviews = useMemo(() => {
    if (filter === "all") return realReviews;
    return realReviews.filter(r => r.occasion.toLowerCase() === filter.toLowerCase());
  }, [realReviews, filter]);

  const occasions = useMemo(
    () => ["all", ...new Set(realReviews.map(r => r.occasion))],
    [realReviews]
  );

  const avg = realReviews.length
    ? (realReviews.reduce((s, r) => s + (r.rating || 0), 0) / realReviews.length).toFixed(1)
    : "—";

  const S = {
    page: { background: B.offwhite, minHeight: "100vh" },
    header: { display:"flex", alignItems:"center", justifyContent:"space-between",
              padding:"22px 32px", borderBottom:`1px solid ${B.lightgray}`, background: B.white },
    brand: { fontFamily: B.serif, fontSize:28, fontWeight:500 },
    eyebrow: { fontSize:11, letterSpacing:"0.22em", textTransform:"uppercase", color:B.gray },
    container: { maxWidth: 1080, margin: "0 auto", padding: "48px 24px" },
    intro: { textAlign:"center", marginBottom:40 },
    h1: { fontFamily:B.serif, fontSize:44, fontWeight:500, lineHeight:1.1, margin:"0 0 16px" },
    sub: { fontSize:15, color:B.gray, lineHeight:1.7, margin:0, maxWidth:560, marginLeft:"auto", marginRight:"auto" },
    summary: { display:"flex", justifyContent:"center", gap:48, marginTop:28, padding:24, background:B.white, borderRadius:12, border:`1px solid ${B.lightgray}` },
    summaryItem: { textAlign:"center" },
    summaryBig: { fontFamily:B.serif, fontSize:42, fontWeight:500, color:B.goldDark, lineHeight:1 },
    summaryLabel: { fontSize:11, letterSpacing:"0.14em", textTransform:"uppercase", color:B.gray, marginTop:6 },
    filters: { display:"flex", gap:8, justifyContent:"center", flexWrap:"wrap", marginBottom:32 },
    chip: (active) => ({
      padding:"7px 14px", borderRadius:999, cursor:"pointer", userSelect:"none",
      fontSize:12, letterSpacing:"0.06em",
      border: active ? `1px solid ${B.gold}` : `1px solid ${B.border}`,
      background: active ? "rgba(201,169,110,0.12)" : B.white,
      color: active ? B.goldDark : B.gray,
      textTransform:"capitalize",
    }),
    grid: { display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(320px, 1fr))", gap:18 },
    card: { background:B.white, padding:24, borderRadius:12, border:`1px solid ${B.lightgray}` },
    starRow: { color:B.gold, fontSize:18, letterSpacing:"3px", marginBottom:10 },
    title: { fontFamily:B.serif, fontSize:20, fontWeight:500, margin:"0 0 10px" },
    body: { fontSize:14, color:B.black, lineHeight:1.7, marginBottom:16 },
    meta: { display:"flex", justifyContent:"space-between", borderTop:`1px solid ${B.lightgray}`, paddingTop:12, fontSize:12, color:B.gray },
    empty: { textAlign:"center", padding:80, background:B.white, borderRadius:14, border:`1px solid ${B.lightgray}` },
    emptyH: { fontFamily:B.serif, fontSize:28, fontWeight:500, margin:"0 0 12px" },
    emptyP: { fontSize:14, color:B.gray, lineHeight:1.7, maxWidth:480, margin:"0 auto 20px" },
    cta: { display:"inline-block", padding:"12px 26px", background:B.gold, color:"#fff", textDecoration:"none", fontSize:13, letterSpacing:"0.12em", textTransform:"uppercase", borderRadius:999 },
    footer: { textAlign:"center", padding:"32px 16px", color:B.gray, fontSize:12, borderTop:`1px solid ${B.lightgray}`, marginTop:48 },
    link: { color:B.goldDark, textDecoration:"none", borderBottom:`1px solid ${B.gold}` },
  };

  return (
    <div style={S.page}>
      <header style={S.header}>
        <div>
          <div style={S.eyebrow}>Lovelri</div>
          <div style={S.brand}>What Couples Say</div>
        </div>
        <a href="./index.html" style={{...S.eyebrow, textDecoration:"none", color:B.goldDark}}>← Hub</a>
      </header>

      <div style={S.container}>
        <div style={S.intro}>
          <h1 style={S.h1}>Real couples,<br/><em style={{fontStyle:"italic"}}>real moments.</em></h1>
          <p style={S.sub}>From first proposal jitters to twentieth-anniversary upgrades. Every Lovelri ring is a chapter — here's what our customers told us.</p>
          {realReviews.length > 0 && (
            <div style={S.summary}>
              <div style={S.summaryItem}>
                <div style={S.summaryBig}>{avg}</div>
                <div style={S.summaryLabel}>Avg rating</div>
              </div>
              <div style={S.summaryItem}>
                <div style={S.summaryBig}>{realReviews.length}</div>
                <div style={S.summaryLabel}>Reviews</div>
              </div>
            </div>
          )}
        </div>

        {realReviews.length === 0 ? (
          <div style={S.empty}>
            <h2 style={S.emptyH}>Reviews launching soon.</h2>
            <p style={S.emptyP}>We're collecting testimonials from our happiest customers. In the meantime, see why Toronto couples choose us in person — book a 30-minute private consultation at Bay Street.</p>
            <a href="./bookings.html" style={S.cta}>Book a viewing</a>
          </div>
        ) : (
          <div>
            {occasions.length > 1 && (
              <div style={S.filters}>
                {occasions.map(o => (
                  <div key={o} style={S.chip(filter === o)} onClick={() => setFilter(o)}>{o}</div>
                ))}
              </div>
            )}
            <div style={S.grid}>
              {filteredReviews.map((r, i) => (
                <div key={i} style={S.card}>
                  <div style={S.starRow}>{stars(r.rating)}</div>
                  <h3 style={S.title}>{r.title}</h3>
                  <p style={S.body}>{r.body}</p>
                  <div style={S.meta}>
                    <span>{r.name} · {r.occasion}</span>
                    <span>{r.source}{r.verified ? " · Verified" : ""}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      <div style={S.footer}>
        Posted a review on Google or WeddingWire? <a href="mailto:hello@lovelri.com" style={S.link}>Send us the link</a> — we'd love to feature it.
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
