// ── ICS CALENDAR GENERATOR ────────────────────────────────────────────────────
// Creates a .ics file Gary can tap to add appointment to Apple/Google Calendar
// Includes 1hr and 15min reminders
function makeICS(booking, consultantName) {
  const [y,m,d] = booking.date.split("-").map(Number);
  const [tp, ap] = booking.time.split(" ");
  let [h,min] = tp.split(":").map(Number);
  if(ap==="PM"&&h!==12) h+=12;
  if(ap==="AM"&&h===12) h=0;
  const pad = n=>String(n).padStart(2,"0");
  const eh = h+Math.floor((min+booking.duration)/60);
  const em = (min+booking.duration)%60;
  const dtStart = `${y}${pad(m)}${pad(d)}T${pad(h)}${pad(min)}00`;
  const dtEnd   = `${y}${pad(m)}${pad(d)}T${pad(eh)}${pad(em)}00`;
  const loc = booking.apptId==="virtual" ? "Virtual — Video Call" : "320 Bay Street\\, Toronto\\, ON M5H 4A6";
  const desc = `Client: ${booking.name}\\nEmail: ${booking.email}\\nPhone: ${booking.phone||"—"}\\nOccasion: ${booking.occasion||"—"}\\nBudget: ${booking.budget||"—"}\\nNotes: ${booking.notes||"—"}\\nBooking ID: ${booking.id}`;
  const ics = [
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Lovelri//Bookings//EN","CALSCALE:GREGORIAN",
    "BEGIN:VEVENT",
    `DTSTART;TZID=America/Toronto:${dtStart}`,
    `DTEND;TZID=America/Toronto:${dtEnd}`,
    `SUMMARY:💍 ${booking.type} — ${booking.name}`,
    `DESCRIPTION:${desc}`,
    `LOCATION:${loc}`,
    `STATUS:CONFIRMED`,
    `BEGIN:VALARM\nTRIGGER:-PT60M\nACTION:DISPLAY\nDESCRIPTION:1 hour: ${booking.type} with ${booking.name}\nEND:VALARM`,
    `BEGIN:VALARM\nTRIGGER:-PT15M\nACTION:DISPLAY\nDESCRIPTION:15 min: ${booking.type} with ${booking.name}\nEND:VALARM`,
    "END:VEVENT","END:VCALENDAR"
  ].join("\r\n");
  return "data:text/calendar;charset=utf8," + encodeURIComponent(ics);
}
// ── CALENDAR DEEP LINKS ───────────────────────────────────────────────────────
// One-click "Add to Calendar" URLs for Google / Outlook (live + 365) / Yahoo.
// These are quick-add deep links that work without any server. The recipient
// taps the link in their email and the event opens pre-filled in their calendar.
function makeCalLinks(booking) {
  const [y, mo, d] = booking.date.split("-").map(Number);
  const [tp, ap] = booking.time.split(" ");
  let [h, min] = tp.split(":").map(Number);
  if (ap === "PM" && h !== 12) h += 12;
  if (ap === "AM" && h === 12) h = 0;
  // Note: we treat the wall-clock time as floating local time. Calendar apps
  // will display it in the user's tz unless ctz is specified (Google).
  const startD = new Date(Date.UTC(y, mo - 1, d, h, min));
  const endD = new Date(startD.getTime() + booking.duration * 60000);
  const fmt = dt => dt.toISOString().replace(/[-:]|\.\d{3}/g, "");
  const startStr = fmt(startD);
  const endStr = fmt(endD);
  const title = `Lovelri ${booking.type} — ${booking.name}`;
  const loc = booking.apptId === "virtual"
    ? "Virtual Video Call (Lovelri)"
    : "320 Bay Street, Toronto ON M5H 4A6";
  const lines = [
    `Lovelri Booking ${booking.id}`,
    `Client: ${booking.name}`,
    `Email: ${booking.email}`,
    `Phone: ${booking.phone || "—"}`,
    `Notes: ${booking.notes || "None"}`,
  ];
  const desc = lines.join("\n");
  const enc = encodeURIComponent;
  return {
    google:  `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${enc(title)}&dates=${startStr}/${endStr}&details=${enc(desc)}&location=${enc(loc)}&ctz=America/Toronto`,
    outlook: `https://outlook.live.com/calendar/0/deeplink/compose?path=%2Fcalendar%2Faction%2Fcompose&rru=addevent&subject=${enc(title)}&startdt=${enc(startD.toISOString())}&enddt=${enc(endD.toISOString())}&body=${enc(desc)}&location=${enc(loc)}`,
    office:  `https://outlook.office.com/calendar/0/deeplink/compose?path=%2Fcalendar%2Faction%2Fcompose&rru=addevent&subject=${enc(title)}&startdt=${enc(startD.toISOString())}&enddt=${enc(endD.toISOString())}&body=${enc(desc)}&location=${enc(loc)}`,
    yahoo:   `https://calendar.yahoo.com/?v=60&title=${enc(title)}&st=${startStr}&et=${endStr}&desc=${enc(desc)}&in_loc=${enc(loc)}`,
  };
}

    await window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_name:  booking.name,

      message:  clientMsg,

  } catch(err) {
    console.error("EmailJS error:", err);
  }
}

                <div style={{width:34,height:34,borderRadius:"50%",background:t.color,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:B.serif,fontSize:17,color:B.white,flexShrink:0}}>{t.name[0]}</div>
                <div style={{flex:1}}>
                  <div style={{fontFamily:B.serif,fontSize:17,color:cons?.id===t.id?B.white:B.black}}>{t.name}</div>

            <NextBtn l="Continue" fn={()=>setStep(2)} off={!ok[1]}/>

        </div>
      )}
      {/* STEP 2 — Date & Time */}
      {step===2&&(
        <div>

            <div style={{fontFamily:B.serif,fontSize:17,color:B.black}}>{MONTHS[month]} {year}</div>
            <button onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);setDate(null);setSlot(null);}} style={{background:"none",border:`1px solid ${B.border}`,padding:"5px 12px",cursor:"pointer",fontFamily:B.sans,fontSize:15,color:B.black}}>›</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
            {DAYS.map(d=><div key={d} style={{fontFamily:B.sans,fontSize:11,color:B.gray,textAlign:"center",letterSpacing:"0.06em"}}>{d}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:20}}>
            {Array.from({length:fD}).map((_,i)=><div key={`e${i}`}/>)}
            {Array.from({length:dIM}).map((_,i)=>{
              const day=i+1, d=new Date(year,month,day);
              const off=d<today||d.getDay()===0||d.getDay()===6;
              const sel=date?.getDate()===day&&date?.getMonth()===month;
              const isT=d.toDateString()===new Date().toDateString();
              return(
                <div key={day} onClick={()=>{if(!off){setDate(d);setSlot(null);}}}
                  style={{aspectRatio:"1",display:"flex",alignItems:"center",justifyContent:"center",cursor:off?"default":"pointer",background:sel?B.black:"transparent",border:isT?`1px solid ${B.gold}`:"1px solid transparent",transition:"background 0.1s"}}
                  onMouseEnter={e=>{if(!off&&!sel)e.currentTarget.style.background=B.offwhite;}}
                  onMouseLeave={e=>{if(!sel)e.currentTarget.style.background="transparent";}}>
                  <span style={{fontFamily:B.sans,fontSize:14,color:sel?B.white:off?B.lightgray:isT?B.gold:B.black}}>{day}</span>
                </div>
              );
            })}
          </div>
          {date&&(
            <div style={{marginBottom:20}}>
              <Lbl c={date.toLocaleDateString("en-CA",{weekday:"long",month:"long",day:"numeric"})}/>
              {slots.length>0
                ?<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                  {slots.map(s=>(
                    <button key={s} onClick={()=>setSlot(s)} style={{padding:"9px 4px",border:`1px solid ${slot===s?B.black:B.border}`,background:slot===s?B.black:B.white,color:slot===s?B.white:B.black,fontFamily:B.sans,fontSize:13,cursor:"pointer",transition:"all 0.15s"}}>
                      {s}
                    </button>
                  ))}
                </div>
                :<div style={{fontFamily:B.sans,fontSize:14,color:B.gray,textAlign:"center",padding:"16px 0"}}>No availability — try another date.</div>
              }
            </div>
          )}
          <div style={{display:"flex",gap:8}}>
            <NavBtn l="← Back" fn={()=>setStep(1)}/>
            <NextBtn l="Continue" fn={()=>setStep(3)} off={!ok[2]}/>
          </div>
        </div>
      )}
      {/* STEP 3 — Contact */}
      {step===3&&(
        <div>
          <Lbl c="Almost there"/>
          <div style={{fontFamily:B.serif,fontSize:24,color:B.black,marginBottom:4,lineHeight:1.2}}>Your details</div>
          <div style={{fontFamily:B.sans,fontSize:14,color:B.gray,marginBottom:20,lineHeight:1.6}}>
            {appt?.label} · {date?.toLocaleDateString("en-CA",{month:"short",day:"numeric"})} at {slot} · {TEAM.find(t=>t.id===cons?.id)?.name}
          </div>
          {[{l:"Full Name *",k:"name",t:"text",p:"Your full name"},{l:"Email Address *",k:"email",t:"email",p:"your@email.com"},{l:"Phone Number",k:"phone",t:"tel",p:"+1 (416) 000-0000"}].map(fi=>(
            <div key={fi.k} style={{marginBottom:13}}>
              <div style={{fontFamily:B.sans,fontSize:11,letterSpacing:"0.16em",textTransform:"uppercase",color:B.gray,marginBottom:5}}>{fi.l}</div>
              <input type={fi.t} value={form[fi.k]} onChange={e=>f(fi.k,e.target.value)} placeholder={fi.p}
                style={{width:"100%",padding:"11px 13px",border:`1px solid ${B.border}`,fontFamily:B.sans,fontSize:15,color:B.black,background:B.white,outline:"none",boxSizing:"border-box"}}
                onFocus={e=>e.target.style.borderColor=B.black}
                onBlur={e=>e.target.style.borderColor=B.border}/>
            </div>
          ))}
          <div style={{marginBottom:13}}>
            <div style={{fontFamily:B.sans,fontSize:11,letterSpacing:"0.16em",textTransform:"uppercase",color:B.gray,marginBottom:8}}>Occasion</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {["Engagement","Anniversary","Custom Gift","Just Exploring"].map(o=>(
                <button key={o} onClick={()=>f("occasion",o)} style={{padding:"9px 8px",border:`1px solid ${form.occasion===o?B.black:B.border}`,background:form.occasion===o?B.black:B.white,color:form.occasion===o?B.white:B.black,fontFamily:B.sans,fontSize:13,cursor:"pointer",transition:"all 0.15s"}}>{o}</button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:13}}>
            <div style={{fontFamily:B.sans,fontSize:11,letterSpacing:"0.16em",textTransform:"uppercase",color:B.gray,marginBottom:8}}>Approximate Budget</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {BUDGET_OPTS.map(o=>(
                <button key={o} onClick={()=>f("budget",o)} style={{padding:"9px 8px",border:`1px solid ${form.budget===o?B.black:B.border}`,background:form.budget===o?B.black:B.white,color:form.budget===o?B.white:B.black,fontFamily:B.sans,fontSize:12,cursor:"pointer",transition:"all 0.15s"}}>{o}</button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontFamily:B.sans,fontSize:11,letterSpacing:"0.16em",textTransform:"uppercase",color:B.gray,marginBottom:5}}>Notes (optional)</div>
            <textarea value={form.notes} onChange={e=>f("notes",e.target.value)} rows={3}
              placeholder="Style preferences, inspiration, questions..."
              style={{width:"100%",padding:"11px 13px",border:`1px solid ${B.border}`,fontFamily:B.sans,fontSize:15,color:B.black,background:B.white,outline:"none",resize:"vertical",boxSizing:"border-box"}}/>
          </div>
          {/* What happens next */}
          <div style={{padding:"11px 13px",background:B.offwhite,border:`1px solid ${B.border}`,marginBottom:16}}>
            <div style={{fontFamily:B.sans,fontSize:12,color:B.black,marginBottom:4,fontWeight:500}}>What happens after you confirm:</div>
            <div style={{fontFamily:B.sans,fontSize:12,color:B.gray,lineHeight:1.8}}>
              ✓ Booking confirmed instantly<br/>
              📧 You'll receive a confirmation email<br/>
              📅 Gary gets an email + calendar invite<br/>
              📞 Team will call to confirm within 2 hours
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <NavBtn l="← Back" fn={()=>setStep(2)}/>
            <NextBtn l={busy?"One moment…":"Confirm Booking"} fn={submit} off={!ok[3]||busy}/>
          </div>
        </div>
      )}
    </div>
  );
}
// ── ADMIN DASHBOARD ───────────────────────────────────────────────────────────
function AdminDash({bookings,onStatus}) {
  const [filter,setFilter]   = useState("all");
  const [view,setView]       = useState("upcoming");
  const [open,setOpen]       = useState(null);
  const [cm,setCm]           = useState(new Date().getMonth());
  const [cy,setCy]           = useState(new Date().getFullYear());
  const todayStr             = new Date().toISOString().split("T")[0];
  const list = bookings
    .filter(b=>filter==="all"||b.consultant===filter)
    .filter(b=>view==="upcoming"?new Date(b.date)>=new Date(todayStr):true)
    .sort((a,b)=>new Date(a.date)-new Date(b.date));
  const byDate={};
  bookings.forEach(b=>{if(!byDate[b.date])byDate[b.date]=[];byDate[b.date].push(b);});
  const dIM=getDaysInMonth(cy,cm);
  const fD=getFirstDay(cy,cm);
  return(
    <div>
      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:1,border:`1px solid ${B.border}`,marginBottom:20}}>
        {[
          {k:"Today",    v:bookings.filter(b=>b.date===todayStr).length,    sub:"appts"},
          {k:"Upcoming", v:bookings.filter(b=>new Date(b.date)>=new Date(todayStr)).length, sub:"total"},
          {k:"Confirmed",v:bookings.filter(b=>b.status==="confirmed").length,sub:"confirmed"},
          {k:"Pending",  v:bookings.filter(b=>b.status==="pending").length,  sub:"action needed",a:true},
        ].map((s,i)=>(
          <div key={i} style={{background:B.white,padding:"12px 8px",borderRight:i<3?`1px solid ${B.border}`:"none"}}>
            <div style={{fontFamily:B.sans,fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color:B.gray,marginBottom:4}}>{s.k}</div>
            <div style={{fontFamily:B.serif,fontSize:24,color:s.a&&s.v>0?B.gold:B.black,lineHeight:1}}>{s.v}</div>
            <div style={{fontFamily:B.sans,fontSize:11,color:B.gray,marginTop:2}}>{s.sub}</div>
          </div>
        ))}
      </div>
      {/* Email routing info */}
      <div style={{border:`1px solid ${B.border}`,background:B.offwhite,padding:"11px 14px",marginBottom:16}}>
        <div style={{fontFamily:B.sans,fontSize:11,letterSpacing:"0.16em",textTransform:"uppercase",color:B.gray,marginBottom:5}}>Email & Calendar Routing</div>
        <div style={{fontFamily:B.sans,fontSize:13,color:B.black,lineHeight:1.8}}>
          Every booking → <strong>garykcli@gmail.com</strong><br/>
          📅 Calendar invite (.ics) included in Gary's email<br/>
          📧 Confirmation copy → client's email
        </div>
      </div>
      {/* Mini calendar */}
      <div style={{border:`1px solid ${B.border}`,background:B.white,marginBottom:16}}>
        <div style={{padding:"9px 14px",borderBottom:`1px solid ${B.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <button onClick={()=>{if(cm===0){setCm(11);setCy(y=>y-1);}else setCm(m=>m-1);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:B.black}}>‹</button>
          <div style={{fontFamily:B.serif,fontSize:16,color:B.black}}>{MONTHS[cm]} {cy}</div>
          <button onClick={()=>{if(cm===11){setCm(0);setCy(y=>y+1);}else setCm(m=>m+1);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:B.black}}>›</button>
        </div>
        <div style={{padding:"8px 10px"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:3}}>{DAYS.map(d=><div key={d} style={{fontFamily:B.sans,fontSize:10,color:B.gray,textAlign:"center"}}>{d[0]}</div>)}</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
            {Array.from({length:fD}).map((_,i)=><div key={`e${i}`}/>)}
            {Array.from({length:dIM}).map((_,i)=>{
              const day=i+1;
              const ds=`${cy}-${String(cm+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
              const has=byDate[ds]?.length>0;
              const isT=ds===todayStr;
              return(
                <div key={day} style={{aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:isT?B.offwhite:"transparent",border:isT?`1px solid ${B.gold}`:"none",position:"relative"}}>
                  <span style={{fontFamily:B.sans,fontSize:12,color:B.black}}>{day}</span>
                  {has&&<div style={{width:4,height:4,borderRadius:"50%",background:B.gold,position:"absolute",bottom:2}}/>}
                </div>
              );
            })}
          </div>
        </div>
      </div>
      {/* Filters */}
      <div style={{display:"flex",gap:5,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",gap:4,flex:1,flexWrap:"wrap"}}>
          {[{id:"all",name:"All",color:B.gray},...TEAM.filter(t=>t.id!=="any")].map(t=>(
            <button key={t.id} onClick={()=>setFilter(t.id)}
              style={{padding:"5px 10px",border:`1px solid ${filter===t.id?B.black:B.border}`,background:filter===t.id?B.black:B.white,color:filter===t.id?B.white:B.black,fontFamily:B.sans,fontSize:11,letterSpacing:"0.06em",textTransform:"uppercase",cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
              {t.id!=="all"&&<div style={{width:6,height:6,borderRadius:"50%",background:t.color}}/>}
              {t.name}
            </button>
          ))}
        </div>
        <div style={{display:"flex",gap:4}}>
          {[["upcoming","Upcoming"],["all","All"]].map(([v,l])=>(
            <button key={v} onClick={()=>setView(v)} style={{padding:"5px 10px",border:`1px solid ${view===v?B.black:B.border}`,background:view===v?B.offwhite:B.white,fontFamily:B.sans,fontSize:11,letterSpacing:"0.06em",textTransform:"uppercase",cursor:"pointer",color:B.black}}>{l}</button>
          ))}
        </div>
      </div>
      {/* Booking list */}
      <Lbl c={`${list.length} appointment${list.length!==1?"s":""}`}/>
      <div style={{border:`1px solid ${B.border}`}}>
        {list.length===0
          ?<div style={{padding:"32px 16px",textAlign:"center",fontFamily:B.sans,fontSize:14,color:B.gray}}>No appointments found.</div>
          :list.map((bk,i)=>{
            const con=TEAM.find(t=>t.id===bk.consultant);
            const isT=bk.date===todayStr;
            const isO=open===bk.id;
            const cl=makeICS(bk,con?.name||"Team");
            return(
              <div key={bk.id} onClick={()=>setOpen(isO?null:bk.id)}
                style={{padding:"13px 16px",borderBottom:i<list.length-1?`1px solid ${B.border}`:"none",background:isT?"rgba(201,169,110,0.04)":B.white,cursor:"pointer",borderLeft:isT?`3px solid ${B.gold}`:"3px solid transparent"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5,gap:8}}>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:B.sans,fontSize:15,color:B.black,fontWeight:500}}>{bk.name}</div>
                    <div style={{fontFamily:B.sans,fontSize:12,color:B.gray}}>{bk.email}{bk.phone?` · ${bk.phone}`:""}</div>
                  </div>
                  <Badge s={bk.status}/>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontFamily:B.sans,fontSize:13,color:B.black}}>{bk.type}</span>
                  <span style={{color:B.lightgray}}>·</span>
                  <span style={{fontFamily:B.sans,fontSize:13,color:B.gray}}>{new Date(bk.date+"T12:00:00").toLocaleDateString("en-CA",{month:"short",day:"numeric"})} at {bk.time}</span>
                  <span style={{color:B.lightgray}}>·</span>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <div style={{width:6,height:6,borderRadius:"50%",background:con?.color||B.gray}}/>
                    <span style={{fontFamily:B.sans,fontSize:12,color:B.gray}}>{con?.name}</span>
                  </div>
                  {bk.budget&&<><span style={{color:B.lightgray}}>·</span><span style={{fontFamily:B.sans,fontSize:12,color:B.gray}}>{bk.budget}</span></>}
                </div>
                {isO&&(
                  <div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${B.border}`}}>
                    {bk.notes&&<div style={{fontFamily:B.sans,fontSize:13,color:B.gray,lineHeight:1.6,marginBottom:10,background:B.offwhite,padding:"9px 11px"}}><strong style={{color:B.black}}>Notes: </strong>{bk.notes}</div>}
                    <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:12}}>
                      {[["ID",bk.id],["Occasion",bk.occasion||"—"],["Duration",`${bk.duration}min`]].map(([k,v])=>(
                        <div key={k}><div style={{fontFamily:B.sans,fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",color:B.gray,marginBottom:2}}>{k}</div><div style={{fontFamily:B.sans,fontSize:13,color:B.black}}>{v}</div></div>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {bk.status!=="confirmed"&&(
                        <button onClick={e=>{e.stopPropagation();onStatus(bk.id,"confirmed");}} style={{padding:"7px 12px",background:B.black,color:B.white,border:"none",fontFamily:B.sans,fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",cursor:"pointer"}}>Confirm</button>
                      )}
                      {bk.status!=="cancelled"&&(
                        <button onClick={e=>{e.stopPropagation();onStatus(bk.id,"cancelled");}} style={{padding:"7px 12px",background:B.white,color:"#c0392b",border:"1px solid #c0392b",fontFamily:B.sans,fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",cursor:"pointer"}}>Cancel</button>
                      )}
                      <a href={`mailto:${bk.email}?subject=Your Lovelri Appointment`} onClick={e=>e.stopPropagation()} style={{padding:"7px 12px",background:B.white,color:B.black,border:`1px solid ${B.border}`,fontFamily:B.sans,fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",cursor:"pointer",textDecoration:"none"}}>Email Client</a>
                      <a href={cl} download={`lovelri-${bk.id}.ics`} onClick={e=>e.stopPropagation()} style={{padding:"7px 12px",background:B.white,color:B.black,border:`1px solid ${B.border}`,fontFamily:B.sans,fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",cursor:"pointer",textDecoration:"none"}}>📅 Add to Cal</a>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
      </div>
    </div>
  );
}

          </div>
        )}
      </div>
      <style>{`*{box-sizing:border-box}`}</style>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
